apiVersion: apps/v1
kind: Deployment
metadata:
  name: solidtime-app
  labels: &default
    app: solidtime-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: *default
  template:
    metadata:
      labels: *default
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      initContainers:
        - name: init-storage
          image: solidtime/solidtime:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /var/www/html/storage/framework/views
              mkdir -p /var/www/html/storage/framework/cache/data
              mkdir -p /var/www/html/storage/framework/sessions
              mkdir -p /var/www/html/storage/logs
              mkdir -p /var/www/html/storage/app/public
          volumeMounts:
            - name: app-storage
              mountPath: /var/www/html/storage
      containers:
        - name: app
          image: solidtime/solidtime:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: solidtime-config
            - secretRef:
                name: solidtime-secrets
          env:
            - name: CONTAINER_MODE
              value: "http"
            - name: AUTO_DB_MIGRATE
              value: "true"
            # Mail config from configmap/secrets
            # DB config handled by envFrom
          volumeMounts:
            - name: app-storage
              mountPath: /var/www/html/storage
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: solidtime-app-storage