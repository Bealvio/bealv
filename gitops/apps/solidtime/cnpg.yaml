apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: solidtime-postgres
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  instances: 1
  bootstrap:
    initdb:
      database: solidtime
      owner: solidtime
      secret:
        name: solidtime-secrets
  storage:
    size: 5Gi