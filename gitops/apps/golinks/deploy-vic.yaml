apiVersion: apps/v1
kind: Deployment
metadata:
  name: golinks-vic
  labels:
    app: golinks-vic
spec:
  selector:
    matchLabels:
      app: golinks-vic
  template:
    metadata:
      labels:
        app: golinks-vic
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - image: ghcr.io/tailscale/golink:main
          name: golink-vic
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
          volumeMounts:
            - mountPath: "/home/nonroot"
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: golinks-vic
